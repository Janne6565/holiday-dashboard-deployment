apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: holidash-prod
resources:
- ../../base
- ingress.yaml
# Starts at `latest` (CI publishes it) so the first ArgoCD sync has a pullable image.
# Once DEPLOY_REPO_TOKEN is set, CI pins these to `main-<sha>` on every push to main.
images:
- name: ghcr.io/janne6565/holiday-dashboard-backend
  newTag: main-a643df7
- name: ghcr.io/janne6565/holiday-dashboard-frontend
  newTag: main-be15962
